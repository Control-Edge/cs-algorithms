name: Linux CI

on:
  push:
    branches: [ "main" ]

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release

jobs:
  ci_test_compilers_gcc:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # compiler: ['10', '11', '12', 'latest']
        compiler: ['12']
    container: gcc:${{ matrix.compiler }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install zlib (required by IXWebSocket)
        run: apt-get update && apt-get install -y zlib1g-dev
      - name: Get latest CMake and ninja
        uses: lukka/get-cmake@v3.27.7

      - name: Run CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - name: Build
        run: cmake --build build --config RelWithDebInfo --target all
      - name: Test
        working-directory: build
        env:
          CPPMODEL_USERNAME: ${{ secrets.CPPMODEL_USERNAME }}
          CPPMODEL_PASSWORD: ${{ secrets.CPPMODEL_PASSWORD }}
        run: ctest --output-on-failure