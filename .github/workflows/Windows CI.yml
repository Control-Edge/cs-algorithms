name: Windows CI

on:
  push:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  msys2:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - sys: UCRT64
            packages: mingw-w64-ucrt-x86_64-toolchain mingw-w64-ucrt-x86_64-cmake mingw-w64-ucrt-x86_64-ninja mingw-w64-ucrt-x86_64-zlib
          - sys: CLANG64
            packages: mingw-w64-clang-x86_64-toolchain mingw-w64-clang-x86_64-cmake mingw-w64-clang-x86_64-ninja mingw-w64-clang-x86_64-zlib
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.sys }}
          update: true
          install: >-
            base-devel
            git
            ${{ matrix.packages }}
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Download and extract CppModel libraries
        run: |
          curl -fsSL https://download.cppmodel.com/CppModel-0.4.2-Windows-${{ matrix.sys }}.zip -o cppmodel.zip
          unzip -q cppmodel.zip
          mkdir -p dependencies
          cp -r CppModel-0.4.2-Windows-${{ matrix.sys }}/* dependencies/
          rm -rf cppmodel.zip CppModel-0.4.2-Windows-${{ matrix.sys }}
      - name: Configure
        run: cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
      - name: Build
        run: cmake --build build --config RelWithDebInfo --parallel 10
      - name: Test
        working-directory: build
        env:
          CPPMODEL_USERNAME: ${{ secrets.CPPMODEL_USERNAME }}
          CPPMODEL_PASSWORD: ${{ secrets.CPPMODEL_PASSWORD }}
        run: ctest --output-on-failure

  msvc:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install OpenSSL and zlib
        run: |
          choco install openssl -y
          vcpkg install zlib:x64-windows-static
      - name: Download and extract CppModel libraries
        run: |
          Invoke-WebRequest -Uri https://download.cppmodel.com/CppModel-0.4.2-Windows-MSVC.zip -OutFile cppmodel.zip
          Expand-Archive -Path cppmodel.zip -DestinationPath cppmodel_extracted
          New-Item -ItemType Directory -Force -Path dependencies | Out-Null
          Copy-Item -Path "cppmodel_extracted\CppModel-0.4.2-Windows-MSVC\*" -Destination dependencies -Recurse -Force
          Remove-Item cppmodel.zip, cppmodel_extracted -Recurse -Force
      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake" -DVCPKG_TARGET_TRIPLET=x64-windows-static
      - name: Build
        run: cmake --build build --config RelWithDebInfo
      - name: Test
        working-directory: build
        env:
          CPPMODEL_USERNAME: ${{ secrets.CPPMODEL_USERNAME }}
          CPPMODEL_PASSWORD: ${{ secrets.CPPMODEL_PASSWORD }}
        run: ctest -C RelWithDebInfo --output-on-failure
